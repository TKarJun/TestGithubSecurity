name: "CodeQL Security Scanning"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '16 13 * * 4'

jobs:
  analyze:
    name: Analyze C# Code
    runs-on: windows-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: csharp

    - name: Restore dependencies
      run: dotnet restore TestGithubSecurity/TestGithubSecurity.csproj

    - name: Build project
      run: dotnet build TestGithubSecurity/TestGithubSecurity.csproj --configuration Release --no-restore

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:csharp"
